name: Build Release APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: esp32_control_flutter
        run: flutter pub get

      - name: Build release APK
        working-directory: esp32_control_flutter
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp32-control-release-apk
          path: esp32_control_flutter/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
